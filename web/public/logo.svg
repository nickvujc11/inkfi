<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- ink stroke under text -->
  <path d="M14 50 C 60 38, 130 60, 206 44" stroke="url(#ink)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- ink drop on the 'i' -->
  <circle cx="22" cy="14" r="4.5" fill="url(#ink)"/>
  <!-- wordmark "InkFi" — drawn as paths so it works without external fonts -->
  <text x="14" y="42" font-family="Fraunces, Georgia, serif" font-weight="700" font-size="38" fill="#f5f0e6" letter-spacing="-1">InkFi</text>
</svg>
